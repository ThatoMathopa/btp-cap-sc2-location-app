_schema-version: '3.1'
ID: location-app
version: 1.0.0
description: "S4 Location Search to Service Cloud V2"

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --omit=dev
        - npx cds build --production

modules:

  # ── 1. CAP Backend ───────────────────────────────────────────────────────────
  - name: location-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    properties:
      NODE_ENV:     production
      GIS_USERNAME: <set-me>
      GIS_PASSWORD: <set-me>
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: location-xsuaa
      - name: location-destination
      - name: location-connectivity

  # ── 2. Approuter (serves UI statically + proxies OData to backend) ───────────
  - name: location-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 128M
      disk-quota: 256M
    build-parameters:
      builder: custom
      commands:
        - bash -c "cp -r ../mashup/webapp ./webapp"
        - npm install
    requires:
      - name: location-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    provides:
      - name: app-api
        properties:
          app-url: ${default-url}

resources:

  # ── XSUAA ────────────────────────────────────────────────────────────────────
  - name: location-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service:      xsuaa
      service-plan: application
      path:         ./xs-security.json
      config:
        xsappname: location-app
        tenant-mode: dedicated

  # ── Destination (needed by backend for THD_NEW and Case_Object) ──────────────
  - name: location-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service:      destination
      service-plan: lite

  # ── Connectivity (Cloud Connector for on-premise S4) ─────────────────────────
  - name: location-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service:      connectivity
      service-plan: lite
