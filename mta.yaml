_schema-version: '3.1'
ID: location-app
version: 1.0.0
description: "S4 Location Search to Service Cloud V2"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --omit=dev
        - npx cds build --production

modules:

  # ── 1. CAP Backend ───────────────────────────────────────────────────────────
  - name: location-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: location-xsuaa
      - name: location-destination
      - name: location-connectivity

  # ── 2. UI App ────────────────────────────────────────────────────────────────
  - name: location-ui
    type: html5
    path: app/mashup
    build-parameters:
      build-result: .
      builder: custom
      commands:
        - bash -c "cd webapp && zip -r ../location-ui.zip ."
      supported-platforms: []

  # ── 3. UI Deployer ───────────────────────────────────────────────────────────
  - name: location-ui-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: location-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: location-ui
          artifacts:
            - location-ui.zip
          target-path: resources/

  # ── 4. Destination Content ───────────────────────────────────────────────────
  - name: location-dest-content
    type: com.sap.application.content
    requires:
      - name: location-destination
        parameters:
          content-target: true
      - name: location-html5-host
        parameters:
          service-key:
            name: location-html5-host-key
      - name: location-xsuaa
        parameters:
          service-key:
            name: location-xsuaa-key
    parameters:
      content:
        instance:
          destinations:
            - Name: location-html5-host
              ServiceInstanceName: location-html5-host
              ServiceKeyName: location-html5-host-key
              sap.cloud.service: com.company.locations
            - Authentication: OAuth2UserTokenExchange
              Name: location-xsuaa
              ServiceInstanceName: location-xsuaa
              ServiceKeyName: location-xsuaa-key
              sap.cloud.service: com.company.locations
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true

resources:

  # ── XSUAA ────────────────────────────────────────────────────────────────────
  - name: location-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service:      xsuaa
      service-plan: application
      path:         ./xs-security.json
      config:
        xsappname: location-app
        tenant-mode: dedicated

  # ── Destination ──────────────────────────────────────────────────────────────
  - name: location-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service:      destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true

  # ── Connectivity (Cloud Connector for on-premise S4) ─────────────────────────
  - name: location-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service:      connectivity
      service-plan: lite

  # ── HTML5 Repo ───────────────────────────────────────────────────────────────
  - name: location-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service:      html5-apps-repo
      service-plan: app-host
